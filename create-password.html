<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYRA - Setup Admin Credentials</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #E8002D;
      --red-dark: #a80020;
      --white: #FFFFFF;
      --black: #000000;
      --gray-200: #CCCCCC;
      --gray-600: #555555;
      --gray-800: #1A1A1A;
      --gray-900: #0D0D0D;
    }

    p, h1, h2, h3, h4, h5, h6 { transition: transform 0.3s ease, text-shadow 0.3s ease, color 0.3s ease; }
p:hover, h1:hover, h2:hover, h3:hover, h4:hover, h5:hover, h6:hover { transform: translateY(-2px); text-shadow: 0 0 12px rgba(255, 255, 255, 0.25); color: var(--white); }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(232, 0, 45, 0.15) 0%, transparent 60%),
        radial-gradient(circle at bottom left, rgba(232, 0, 45, 0.1) 0%, transparent 50%);
      z-index: 0;
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(232, 0, 45, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232, 0, 45, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 0 1.5rem;
      animation: fadeUp 0.6s ease-out forwards;
    }

    .login-box {
      background: rgba(20, 20, 20, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 3rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--red);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 0.12em;
      color: var(--white);
      text-decoration: none;
      margin-bottom: 0.5rem;
    }

    .brand-logo img {
      height: 2.4rem;
      width: auto;
    }

    .brand-logo span {
      color: var(--red);
    }

    .brand-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-600);
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-200);
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.9rem 1rem;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--red);
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 0 15px rgba(232, 0, 45, 0.15);
    }

    .btn-submit {
      width: 100%;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--red);
      padding: 1rem;
      border: none;
      cursor: pointer;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition: all 0.2s ease;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      background: var(--red-dark);
      transform: translateY(-2px);
    }

    .login-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--gray-600);
    }

    .login-footer a {
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .login-footer a:hover {
      color: var(--red);
    }

    .back-home {
      position: absolute;
      top: 2rem;
      left: 2rem;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-200);
      text-decoration: none;
      transition: color 0.2s, transform 0.2s;
    }

    .back-home:hover {
      color: var(--white);
      transform: translateX(-4px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
  <link rel="icon" type="image/png" href="LyraEsportsLogo.png">
  <link rel="stylesheet" href="animations.css">
</head>

<body>
  <!-- Background Elements -->
  <div class="hero-grid-overlay"></div>
  <div class="hero-bg"></div>

  <!-- Back Navigation -->
  <a href="index.html" class="back-home">&larr; Return to Home</a>

  <!-- Container -->
  <div class="login-wrapper">
    <div class="login-box">

      <div class="brand-header">
        <a href="index.html" class="brand-logo">
          <img src="LyraEsportsLogo.png" alt="Lyra Logo">
          <div><span>L</span>YRA</div>
        </a>
        <p class="brand-subtitle">Action Required: Secure Your Account</p>
      </div>

      <form action="login.html" method="GET" id="setupForm">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-input" placeholder="Approved In-Game Alias" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Create Password</label>
          <input type="password" id="password" class="form-input" placeholder="Must be at least 8 characters" required
            minlength="8">
        </div>

        <div class="form-group">
          <label for="confirm" class="form-label">Confirm Password</label>
          <input type="password" id="confirm" class="form-input" placeholder="Repeat your password" required
            minlength="8">
        </div>

        <button type="submit" class="btn-submit">Finalize Account</button>
      </form>

      <div class="login-footer">
        Have credentials already? <a href="login.html">Sign In</a>
      </div>

    </div>
  </div>

  <!-- Supabase Core -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>

  <script>
    document.getElementById('setupForm').addEventListener('submit', function (e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        alert('Passwords do not match. Please try again.');
        return;
      }

      const username = document.getElementById('username').value.trim();
      
      supabase.from('lyra_approved_admins').select('id, ign').then(({ data, error }) => {
        if(error) {
          console.error(error);
          return alert("Database connection failed. Please try again later.");
        }

        const approvedAdmins = data || [];
        const isApprovedItem = approvedAdmins.find(admin => {
          return admin.ign.toLowerCase() === username.toLowerCase();
        });

        if (!isApprovedItem) {
          alert('Unauthorized: This alias has not been granted Admin Access. If you recently applied, please wait for an approval email.');
          return;
        }

        supabase.from('lyra_approved_admins').update({ password: password }).eq('id', isApprovedItem.id).then(({error: updateError}) => {
          if (updateError) {
            console.error(updateError);
            return alert("Failed to secure account. Please try again later.");
          }
          alert(`Account for ${username} successfully secured! Redirecting to login...`);
          window.location.href = 'login.html';
        });
      });
    });
  </script>
  <script src="animations.js"></script>
</body>

</html>
