<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYRA - Apply for Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #E8002D;
      --red-dark: #a80020;
      --white: #FFFFFF;
      --black: #000000;
      --gray-200: #CCCCCC;
      --gray-600: #555555;
      --gray-800: #1A1A1A;
      --gray-900: #0D0D0D;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Background Aesthetics */
    .hero-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(232, 0, 45, 0.15) 0%, transparent 60%),
        radial-gradient(circle at bottom left, rgba(232, 0, 45, 0.1) 0%, transparent 50%);
      z-index: 0;
    }

    .hero-grid-overlay {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(232, 0, 45, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232, 0, 45, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* Container */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 580px;
      /* Slightly wider for the robust form */
      padding: 3rem 1.5rem;
      animation: fadeUp 0.6s ease-out forwards;
    }

    .login-box {
      background: rgba(20, 20, 20, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 3rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--red);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 0.12em;
      color: var(--white);
      text-decoration: none;
      margin-bottom: 0.5rem;
    }

    .brand-logo img {
      height: 2.4rem;
      width: auto;
    }

    .brand-logo span {
      color: var(--red);
    }

    .brand-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-600);
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 500px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }

    .form-label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-200);
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.9rem 1rem;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--red);
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 0 15px rgba(232, 0, 45, 0.15);
    }

    select.form-input {
      appearance: none;
      cursor: pointer;
    }

    textarea.form-input {
      resize: vertical;
      min-height: 100px;
    }

    .btn-submit {
      width: 100%;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--red);
      padding: 1rem;
      border: none;
      cursor: pointer;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition: all 0.2s ease;
      margin-top: 1rem;
    }

    .btn-submit:hover {
      background: var(--red-dark);
      transform: translateY(-2px);
    }

    .login-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--gray-600);
    }

    .login-footer a {
      color: var(--white);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .login-footer a:hover {
      color: var(--red);
    }

    .back-home {
      position: absolute;
      top: 2rem;
      left: 2rem;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-200);
      text-decoration: none;
      transition: color 0.2s, transform 0.2s;
    }

    .back-home:hover {
      color: var(--white);
      transform: translateX(-4px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .decor-cross {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      width: 40px;
      height: 40px;
      opacity: 0.15;
      pointer-events: none;
    }

    .decor-cross::before,
    .decor-cross::after {
      content: '';
      position: absolute;
      background: var(--white);
    }

    .decor-cross::before {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      transform: translateY(-50%);
    }

    .decor-cross::after {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      transform: translateX(-50%);
    }
  </style>
</head>

<body>

  <!-- Background Elements -->
  <div class="hero-grid-overlay"></div>
  <div class="hero-bg"></div>

  <!-- Back Navigation -->
  <a href="index.html" class="back-home">
    &larr; Return to Home
  </a>

  <!-- Application Container -->
  <div class="login-wrapper">
    <div class="login-box">

      <div class="brand-header">
        <a href="index.html" class="brand-logo">
          <img src="LyraEsportsLogo.png" alt="Lyra Logo">
          <div><span>L</span>YRA</div>
        </a>
        <p class="brand-subtitle">Membership Application</p>
      </div>

      <form action="pending.html" method="GET">

        <div class="form-row">
          <div class="form-group">
            <label for="fullName" class="form-label">Full Name</label>
            <input type="text" id="fullName" class="form-input" placeholder="Jordan Doe" required>
          </div>
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ign" class="form-label">In-Game / Alias</label>
            <input type="text" id="ign" class="form-input" placeholder="e.g. Shadow" required>
          </div>
          <div class="form-group">
            <label for="discord" class="form-label">Discord ID</label>
            <input type="text" id="discord" class="form-input" placeholder="username#1234" required>
          </div>
        </div>

        <div class="form-group">
          <label for="role" class="form-label">Primary Interest</label>
          <select id="role" class="form-input" required>
            <option value="" disabled selected>Select an option</option>
            <option value="valorant">VALORANT Roster</option>
            <option value="lol">League of Legends</option>
            <option value="content">Content Creator</option>
            <option value="admin">Website Admin</option>
            <option value="adminAccess">Management</option>
          </select>
        </div>

        <div class="form-group">
          <label for="reason" class="form-label">Why LYRA?</label>
          <textarea id="reason" class="form-input" placeholder="Tell us about yourself and your goals..."
            required></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Application</button>
      </form>

      <div class="login-footer">
        Already have an account? <a href="login.html">Sign In Here</a>
      </div>

      <!-- Tech aesthetic decoration -->
      <div class="decor-cross"></div>
    </div>
  </div>

  <script>
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const roleSelect = document.getElementById('role');
      const app = {
        name: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        ign: document.getElementById('ign').value,
        discord: document.getElementById('discord').value,
        role: roleSelect.options[roleSelect.selectedIndex].text,
        roleValue: roleSelect.value,
        reason: document.getElementById('reason').value,
        timestamp: new Date().getTime()
      };
      
      let apps = JSON.parse(localStorage.getItem('lyra_applications') || '[]');
      apps.push(app);
      localStorage.setItem('lyra_applications', JSON.stringify(apps));
      
      window.location.href = 'pending.html';
    });
  </script>
</body>

</html>
