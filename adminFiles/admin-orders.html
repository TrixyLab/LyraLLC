<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYRA - Store Orders Management</title>
  <script src="portal-bridge.js"></script>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@400;500;600&display=block"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #E8002D;
      --red-dark: #a80020;
      --white: #FFFFFF;
      --black: #000000;
      --gray-200: #CCCCCC;
      --gray-600: #555555;
      --gray-800: #1A1A1A;
      --gray-900: #0D0D0D;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    .main-content {
      flex: 1;
      width: 100%;
      padding: 3rem 4rem;
      background: var(--black);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 100vh;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      letter-spacing: 0.03em;
      margin-bottom: 1rem;
    }

    .header-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--red);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 1.2rem;
    }
  </style>
  <link rel="stylesheet" href="../responsive.css">
</head>

<body>
  <main class="main-content">
    <div>
      <p class="header-subtitle">Management</p>
      <h1 class="header-title">Store Orders Control</h1>
      <p style="color: var(--gray-600); font-size: 1.2rem;">This module is currently under development.<br>Inventory
        tracking and order fulfillment tracking coming soon.</p>
    </div>
  </main>
  <!-- Supabase Core -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>

  <script>
    // Role-based Navigation Access
    const userRole = localStorage.getItem('lyra_role');
    const authUser = (localStorage.getItem('lyra_user') || '').toLowerCase();
    const role = (userRole || '').toLowerCase();
    const isSimulation = localStorage.getItem('lyra_view_as') !== null;
    const isHardcodedSuper = (authUser === 'admin' || authUser === 'versa') && !isSimulation;
    const isOwnerOrIT = role.includes('owner') || role.includes('it director') || isHardcodedSuper;
    const isManagement = isOwnerOrIT ||
                        role.includes('management') ||
                        role.includes('operation directors') ||
                        role.includes('director') ||
                        role.includes('recruiter');

    // Hide Management if not authorized
    if (!isManagement) {
      const mgmtNav = document.getElementById('nav-management');
      if (mgmtNav) mgmtNav.style.display = 'none';
      const pagePath = window.location.pathname.split("/").pop();
      const mgmtPages = ['admin-dashboard.html', 'admin-roster.html', 'admin-reviews.html', 'admin-updates.html', 'admin-scheduling.html', 'admin-schedule-events.html'];
      if (mgmtPages.includes(pagePath)) window.location.href = 'admin-overview.html';
    }

    if (isOwnerOrIT) {
      const superNav = document.getElementById('nav-super');
      if (superNav) superNav.style.display = 'block';
    }

    // Restrict access to specific pages based on role
    const pagePath = window.location.pathname.split("/").pop();

    // For admin-roster.html
    if (pagePath === 'admin-roster.html' && !isManagement) {
      window.location.href = 'admin-overview.html';
    }

    // For admin-orders.html
    if (pagePath === 'admin-orders.html' && !isManagement) {
      window.location.href = 'admin-overview.html';
    }

    // For admin-access.html
    if (pagePath === 'admin-access.html' && !isOwnerOrIT) {
      window.location.href = 'admin-overview.html';
    }

    // For admin-settings.html
    if (pagePath === 'admin-settings.html' && !isManagement) {
      window.location.href = 'admin-overview.html';
    }

    // Staff role restrictions
    if (role === 'staff') {
      const newsNav = document.getElementById('nav-news');
      const ordersNav = document.getElementById('nav-orders');
      const accessNav = document.getElementById('nav-access');
      const settingsNav = document.getElementById('nav-settings'); // Assuming nav-settings exists for staff restriction

      if (newsNav) newsNav.style.display = 'none';
      if (ordersNav) ordersNav.style.display = 'none';
      if (accessNav) accessNav.style.display = 'none';
      if (settingsNav) settingsNav.style.display = 'none'; // Hide settings for staff

      const restrictedPagesForStaff = ['admin-news.html', 'admin-orders.html', 'admin-reviews.html', 'admin-roster.html', 'admin-access.html', 'admin-super-panel.html', 'admin-settings.html'];
      if (restrictedPagesForStaff.includes(pagePath)) window.location.href = 'admin-overview.html';
    }
  </script>
  <script src="../responsive.js"></script>
</body>

</html>
