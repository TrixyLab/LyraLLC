<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYRA - Event Schedule</title>
  <script src="portal-bridge.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #E8002D; --red-dark: #a80020;
      --white: #FFFFFF; --black: #000000;
      --gray-200: #CCCCCC; --gray-600: #555555;
      --gray-800: #1A1A1A; --gray-900: #0D0D0D;
    }
    body { background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; }
    .main-content { flex: 1; width: 100%; padding: 3rem 4rem; background: var(--black); position: relative; display: block; overflow-y: auto; }
    .header-section { margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: flex-end; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 0.03em; margin-top: 0.5rem; }
    .header-subtitle { font-family: 'Barlow Condensed', sans-serif; color: var(--red); font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; font-size: 1rem; }

    .form-container { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 2.5rem; margin-bottom: 4rem; }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; color: var(--gray-600); letter-spacing: 0.1em; }
    .form-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; padding: 0.8rem; color: var(--white); font-family: 'Barlow', sans-serif; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--red); outline: none; }
    .submit-btn { width: 100%; background: var(--red); color: var(--white); border: none; padding: 1rem; border-radius: 4px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer; transition: background 0.2s; margin-top: 1rem; }
    .submit-btn:hover { background: var(--red-dark); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .event-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 1.5rem; border-left: 4px solid var(--red); transition: transform 0.2s; }
    .event-card:hover { transform: translateY(-4px); border-color: rgba(232, 0, 45, 0.3); }
    .event-type { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 4px; margin-bottom: 0.5rem; display: inline-block; }
    .event-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
    .event-time { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--red); font-size: 1.1rem; margin-bottom: 1rem; }
    .event-desc { font-size: 0.85rem; color: var(--gray-600); line-height: 1.5; margin-bottom: 1.5rem; min-height: 3rem; }
    .event-meta { border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 1rem; font-size: 0.75rem; color: var(--gray-600); display: flex; justify-content: space-between; }
    .empty-state { grid-column: 1/-1; text-align: center; color: var(--gray-600); font-style: italic; padding: 3rem; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@400;500;600&display=block" rel="stylesheet">
</head>
<body>
  <main class="main-content">
    <div class="header-section">
      <div>
        <p class="header-subtitle">Coordination</p>
        <h1 class="header-title">Event Schedule</h1>
      </div>
    </div>

    <section class="form-container">
      <form id="eventForm">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Event Title / Team</label>
            <input type="text" id="eventTitle" class="form-input" placeholder="e.g. Scrim vs Team Envy" required>
          </div>
          <div class="form-group">
            <label class="form-label">Event Type</label>
            <select id="eventType" class="form-input" required>
              <option value="Scrim">Scrim</option>
              <option value="Meeting">Meeting</option>
              <option value="Bootcamp">Bootcamp</option>
              <option value="Event">Event</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Start Date & Time</label>
            <input type="datetime-local" id="eventStart" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Brief Description</label>
            <input type="text" id="eventDesc" class="form-input" placeholder="e.g. Map order: Bind, Haven, Abyss">
          </div>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Schedule Event</button>
      </form>
    </section>

    <div class="header-section">
      <div>
        <h2 class="header-title" style="font-size: 2rem;">Upcoming Events</h2>
      </div>
    </div>

    <div class="events-grid" id="eventsList">
      <div class="empty-state">Loading timeline...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <script>
    const eventForm = document.getElementById('eventForm');
    const submitBtn = document.getElementById('submitBtn');

    eventForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = localStorage.getItem('lyra_user');
      if (!username) return alert('Session expired.');

      submitBtn.disabled = true;
      submitBtn.innerText = 'Scheduling...';

      const payload = {
        title: document.getElementById('eventTitle').value,
        type: document.getElementById('eventType').value,
        start_time: new Date(document.getElementById('eventStart').value).toISOString(),
        description: document.getElementById('eventDesc').value,
        author: username
      };

      try {
        const { error } = await supabase.from('lyra_events').insert([payload]);
        if (error) throw error;
        alert('Event scheduled successfully!');
        eventForm.reset();
        fetchEvents();
      } catch (err) {
        console.error(err);
        alert('Error scheduling event: ' + (err.message || 'Unknown Error'));
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Schedule Event';
      }
    });

    async function fetchEvents() {
      const today = new Date();
      today.setHours(0,0,0,0);

      const { data, error } = await supabase.from('lyra_events').select('*').gte('start_time', today.toISOString()).order('start_time', { ascending: true });
      const container = document.getElementById('eventsList');
      
      if (error) {
        if (error.code === 'PGRST205') {
          container.innerHTML = '<div class="empty-state">Database table "lyra_events" is missing. Please run the Supabase schema SQL.</div>';
          console.warn('Table lyra_events does not exist yet.');
        } else {
          container.innerHTML = '<div class="empty-state">Error loading events: ' + error.message + '</div>';
          console.error('Error fetching events:', error);
        }
        return;
      }
      
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state">No upcoming events scheduled.</div>';
        return;
      }

      container.innerHTML = data.map(ev => {
        const startTime = new Date(ev.start_time).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' });
        let typeColor = 'var(--red)';
        if (ev.type === 'Scrim') typeColor = '#28a745';
        if (ev.type === 'Meeting') typeColor = '#007bff';

        return `
          <div class="event-card" style="border-left-color: ${typeColor}">
            <div class="event-type" style="background: rgba(${typeColor === '#28a745' ? '40, 167, 69' : (typeColor === '#007bff' ? '0, 123, 255' : '232, 0, 45')}, 0.1); color: ${typeColor}">${ev.type}</div>
            <h3 class="event-title">${ev.title}</h3>
            <div class="event-time">${startTime}</div>
            <p class="event-desc">${ev.description || 'No additional details provided.'}</p>
            <div class="event-meta">
              <span>By ${ev.author}</span>
              <span>${new Date(ev.timestamp).toLocaleDateString()}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    fetchEvents();
    supabase.channel('public:lyra_events').on('postgres_changes', { event: '*', schema: 'public', table: 'lyra_events' }, fetchEvents).subscribe((status) => {
      if (status === 'CHANNEL_ERROR') {
         console.warn('Realtime subscription issue for lyra_events - table may be missing.');
      }
    });

    // Role-based Navigation Access
    const userRole = localStorage.getItem('lyra_role');
    const authUser = (localStorage.getItem('lyra_user') || '').toLowerCase();
    const isSimulation = localStorage.getItem('lyra_view_as') !== null;
    const isHardcodedSuper = (authUser === 'admin' || authUser === 'versa') && !isSimulation;
    const isOwnerOrIT = userRole === 'Owner' || userRole === 'IT Director' || isHardcodedSuper;
    const isManagement = isOwnerOrIT || 
                        userRole === 'Operation Directors' || 
                        userRole === 'Management' || 
                        userRole === 'Game management' || 
                        userRole === 'Director of Media' || 
                        userRole === 'Lead Recruiter';
    
    // Hide Management if not authorized
    if (!isManagement) {
      const mgmtNav = document.getElementById('nav-management');
      if (mgmtNav) mgmtNav.style.display = 'none';
      
      const page = window.location.pathname.split("/").pop();
      const mgmtPages = ['admin-dashboard.html', 'admin-roster.html', 'admin-reviews.html', 'admin-updates.html', 'admin-scheduling.html', 'admin-schedule-events.html'];
      if (mgmtPages.includes(page)) window.location.href = 'admin-overview.html';
    }

    if (isOwnerOrIT) {
      const superNav = document.getElementById('nav-super');
      if (superNav) superNav.style.display = 'block';
    }

  </script>
  <script src="../animations.js"></script>
  <script src="../responsive.js"></script>
</body>
</html>
