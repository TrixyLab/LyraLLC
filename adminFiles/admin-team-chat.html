    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      width: 100%;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .main-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(232, 0, 45, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* CHAT INTERFACE */
    .chat-container {
      position: relative;
      z-index: 10;
      display: flex;
      width: 100%;
      height: 100%;
    }

    .chat-channels {
      width: 250px;
      background: rgba(13, 13, 13, 0.7);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 0;
    }

    .channel-header {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray-600);
      padding: 0 1.5rem;
      margin-bottom: 1rem;
      margin-top: 1rem;
    }

    .channel-link {
      display: block;
      padding: 0.7rem 1.5rem;
      font-size: 0.95rem;
      color: var(--gray-200);
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      border-left: 2px solid transparent;
    }

    .channel-link:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--white);
    }

    .channel-link.active {
      background: rgba(232, 0, 45, 0.08);
      color: var(--white);
      border-left-color: var(--red);
      font-weight: 600;
    }

    .chat-window {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: transparent;
    }

    .chat-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
    }

    .chat-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--white);
      line-height: 1;
    }

    .chat-desc {
      font-size: 0.85rem;
      color: var(--gray-600);
      margin-top: 0.3rem;
    }

    .chat-messages {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .message {
      display: flex;
      gap: 1rem;
    }

    .msg-avatar {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      background: var(--gray-800);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: var(--white);
      border: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .msg-avatar.admin {
      background: rgba(232, 0, 45, 0.2);
      border-color: rgba(232, 0, 45, 0.5);
      color: var(--red);
    }

    .msg-content {
      flex: 1;
    }

    .msg-header {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      margin-bottom: 0.3rem;
    }

    .msg-author {
      font-weight: 600;
      color: var(--white);
      font-size: 0.95rem;
    }

    .msg-time {
      font-size: 0.75rem;
      color: var(--gray-600);
      font-family: 'Barlow Condensed', sans-serif;
      letter-spacing: 0.05em;
    }

    .msg-text {
      color: var(--gray-200);
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .chat-input-wrapper {
      padding: 1.5rem 2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
    }

    .chat-input-box {
      display: flex;
      background: var(--gray-900);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .chat-input-box:focus-within {
      border-color: var(--red);
      box-shadow: 0 0 10px rgba(232, 0, 45, 0.1);
    }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 1rem 1.2rem;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      outline: none;
      resize: none;
    }

    .chat-input::placeholder {
      color: var(--gray-600);
    }

    .btn-send {
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 0 1.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-send:hover {
      background: var(--red-dark);
    }

    .btn-plus {
      background: transparent;
      border: none;
      color: var(--gray-600);
      font-size: 1.5rem;
      padding: 0 1rem;
      cursor: pointer;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-plus:hover {
      color: var(--white);
    }

    /* MENTION SUGGESTIONS */
    #mentionSuggestions {
      position: absolute;
      bottom: 100%;
      left: 2rem;
      width: 200px;
      max-height: 200px;
      background: var(--gray-900);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow-y: auto;
      z-index: 2000;
      display: none;
      box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
    }

    .mention-item {
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--gray-200);
      transition: all 0.2s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .mention-item:hover,
    .mention-item.active {
      background: rgba(232, 0, 45, 0.2);
      color: var(--white);
    }

    .mention-item:last-child {
      border-bottom: none;
    }

<body>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="main-bg"></div>

    <div class="chat-container">

      <!-- CHANNELS LEFT PANE -->
      <div class="chat-channels">
        <p class="channel-header">Team HQ</p>
        <div id="defaultChannels">
          <a href="#" class="channel-link active" data-channel="team-announcements">📢 announcements</a>
          <a href="#" class="channel-link" data-channel="team-chat">💬 team-chat</a>
          <a href="#" class="channel-link" data-channel="scrim-coordination">⚔️ scrims</a>
        </div>

        <div
          style="display: flex; justify-content: space-between; align-items: center; padding-right: 1.5rem; margin-top: 1rem;">
          <p class="channel-header" style="margin: 0; padding-left: 0.8rem;">Custom Channels</p>
          <button id="addChannelBtn"
            style="background:none; border:none; color:var(--red); font-size:1.2rem; cursor:pointer; padding: 0 0.5rem; line-height: 1;"
            title="Create Channel">+</button>
        </div>
        <div id="customChannels">
          <!-- Dynamically populated -->
        </div>
      </div>

      <!-- CHAT INTERFACE RIGHT PANE -->
      <div class="chat-window">
        <div class="chat-header">
          <div>
            <h2 class="chat-title"># announcements</h2>
            <p class="chat-desc" id="channelDesc">Official team announcements and alerts.</p>
          </div>
          <div id="memberCount"
            style="color:var(--gray-600); font-size:0.85rem; font-family:'Barlow Condensed',sans-serif; letter-spacing:0.1em;">
            👥 TEAM ACCESS
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <!-- Messages will populate here -->
        </div>

        <div id="typingIndicator"
          style="display:none; color:var(--red); font-size:0.85rem; padding: 0 2rem 1rem; font-family:'Barlow Condensed', sans-serif; letter-spacing:0.1em; font-weight:600;">
          Someone is typing...
        </div>

        <div class="chat-input-wrapper">
          <div id="mentionSuggestions"></div>
          <div class="chat-input-box">
            <input type="file" id="imageUpload" style="display:none;" accept="image/*">
            <button id="uploadBtn" class="btn-plus" title="Upload Image">+</button>
            <input type="text" id="chatInput" class="chat-input" placeholder="Type your message..." autocomplete="off">
            <button id="sendBtn" class="btn-send">SEND</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const teamParam = urlParams.get('team') || 'general';
    const regParam = urlParams.get('reg') || 'na';
    const teamContext = teamParam.toUpperCase() + ' - ' + regParam.toUpperCase();

    document.querySelectorAll('.channel-header')[0].innerText = teamContext + ' HQ';

    const currentUser = localStorage.getItem('lyra_user') || 'User';

    let currentChannel = 'team-' + teamParam + '-' + regParam + '-announcements';
    let messagesRef = null;
    let typingRef = null;

    // Supabase Core Logic
    const chatContainer = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const imageUpload = document.getElementById('imageUpload');
    const uploadBtn = document.getElementById('uploadBtn');

    // --- Branding & Identity ---
    async function fetchGlobalBranding() {
      const { data } = await supabase.from('lyra_branding').select('*').eq('id', 'global').single();
      if (data && data.logo_url) {
        document.querySelectorAll('.brand-logo img').forEach(img => {
          img.src = data.logo_url;
        });
      }
    }
    fetchGlobalBranding();

    function switchChannel(channelId) {
      if (messagesRef) supabase.removeChannel(messagesRef);
      if (typingRef) supabase.removeChannel(typingRef);

      currentChannel = channelId;
      document.querySelector('.chat-title').innerText = '# ' + channelId.replace('team-', '');

      chatContainer.innerHTML = '';
      supabase.from('chat_messages').select('*').eq('channel_id', currentChannel).order('timestamp', { ascending: true }).then(({ data }) => {
        if (data) data.forEach(msg => renderMessage(msg, msg.id));
        chatContainer.scrollTop = chatContainer.scrollHeight;
      });

      messagesRef = supabase.channel('msg_' + currentChannel)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: 'channel_id=eq.' + currentChannel }, payload => renderMessage(payload.new, payload.new.id))
        .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'chat_messages', filter: 'channel_id=eq.' + currentChannel }, payload => {
          const el = document.querySelector(`.message[data-key="${payload.old.id}"]`);
          if (el) el.remove();
        }).subscribe();

      typingRef = supabase.channel('typing_' + currentChannel).on('presence', { event: 'sync' }, () => {
        const state = typingRef.presenceState();
        const typingUsers = new Set();
        Object.keys(state).forEach(k => state[k].forEach(p => { if (p.user !== currentUser) typingUsers.add(p.user); }));
        typingIndicator.style.display = typingUsers.size > 0 ? 'block' : 'none';
        if (typingUsers.size > 0) typingIndicator.innerText = Array.from(typingUsers).join(', ') + ' is typing...';
      }).subscribe();
    }

    function renderMessage(msg, key) {
      const isMe = msg.author?.toLowerCase() === currentUser.toLowerCase();
      const div = document.createElement('div');
      div.className = 'message';
      div.dataset.key = key;
      div.style.marginBottom = '1.2rem';
      div.innerHTML = `
        <div style="display:flex; align-items:center; gap:0.5rem;">
          <div style="width:28px; height:28px; border-radius:4px; background:${isMe ? 'var(--red)' : 'var(--gray-800)'}; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:0.9rem;">${msg.author?.[0].toUpperCase()}</div>
          <div style="font-family:'Barlow Condensed',sans-serif; font-weight:700; color:var(--red); font-size:0.95rem; text-transform:uppercase;">${msg.author}</div>
          <div style="font-size:0.65rem; color:var(--gray-600);">${msg.time}</div>
        </div>
        <div style="padding-left:33px; font-size:0.95rem; color:var(--gray-200); line-height:1.3;">${msg.text}</div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    sendBtn.addEventListener('click', () => {
      const text = chatInput.value.trim();
      if (!text) return;
      const now = new Date();
      const timeStr = now.getHours() + ':' + now.getMinutes();
      supabase.from('chat_messages').insert([{ channel_id: currentChannel, author: currentUser, time: timeStr, text: text }]).then(() => {
        chatInput.value = '';
      });
    });

    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

    // Channel Switching Listeners
    document.querySelectorAll('.channel-link').forEach(link => {
      link.onclick = (e) => {
        e.preventDefault();
        document.querySelectorAll('.channel-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        switchChannel(link.dataset.channel);
      };
    });

    switchChannel('team-' + teamParam + '-' + regParam + '-general');
  </script>
</body>
