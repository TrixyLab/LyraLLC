<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYRA - Admin Access</title>
  <script src="portal-bridge.js"></script>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;900&family=Barlow:wght@400;500;600&display=block"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #E8002D;
      --red-dark: #a80020;
      --green: #00E85D;
      --green-dark: #00a843;
      --white: #FFFFFF;
      --black: #000000;
      --gray-200: #CCCCCC;
      --gray-600: #555555;
      --gray-800: #1A1A1A;
      --gray-900: #0D0D0D;
    }

    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      transition: transform 0.3s ease, text-shadow 0.3s ease, color 0.3s ease;
    }

    p:hover,
    h1:hover,
    h2:hover,
    h3:hover,
    h4:hover,
    h5:hover,
    h6:hover {
      transform: translateY(-2px);
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
      color: var(--white);
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      width: 100%;
      padding: 3rem 4rem;
      background: var(--black);
      position: relative;
      min-height: 100vh;
    }

    .main-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(232, 0, 45, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .header {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 3rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 2rem;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      letter-spacing: 0.03em;
      line-height: 1;
      color: var(--white);
    }

    .header-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      color: var(--red);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
    }

    /* CARDS */
    .apps-container {
      position: relative;
      z-index: 10;
    }

    .app-card {
      background: var(--gray-900);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 2rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .app-card:hover {
      border-color: rgba(232, 0, 45, 0.3);
      background: rgba(26, 26, 26, 0.9);
    }

    .app-info {
      flex: 1;
    }

    .app-role {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      background: rgba(232, 0, 45, 0.1);
      padding: 0.25rem 0.75rem;
      display: inline-block;
      margin-bottom: 1rem;
    }

    .app-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.03em;
      line-height: 1;
      color: var(--white);
      margin-bottom: 0.5rem;
    }

    .app-meta {
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
      color: var(--gray-200);
      margin-bottom: 1rem;
    }

    .app-reason {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--gray-600);
      max-width: 80%;
      border-left: 2px solid rgba(255, 255, 255, 0.1);
      padding-left: 1rem;
    }

    .app-actions {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      min-width: 140px;
    }

    .btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.8rem;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.2s;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }

    .btn-accept {
      background: var(--white);
      color: var(--black);
    }

    .btn-accept:hover {
      background: var(--green);
      color: var(--black);
    }

    .btn-decline {
      background: transparent;
      color: var(--gray-200);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-decline:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(232, 0, 45, 0.05);
    }

    @media (max-width: 900px) {
      .app-card {
        flex-direction: column;
        align-items: stretch;
        gap: 1.5rem;
      }

      .app-reason {
        max-width: 100%;
        border-left: none;
        padding-left: 0;
        padding-top: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .app-actions {
        flex-direction: row;
      }

      .btn {
        flex: 1;
      }
    }
  </style>
  <link rel="icon" type="image/png" href="../LyraEsportsLogo.png">
  <link rel="stylesheet" href="../animations.css">
  <link rel="stylesheet" href="../responsive.css">
</head>

<body>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="main-bg"></div>

    <div class="header">
      <div>
        <p class="header-subtitle">Access Control</p>
        <h1 class="header-title">Admin Access Requests</h1>
      </div>
    </div>

    <div class="apps-container" id="adminRequestsContainer">
    </div>

  </main>

  <!-- Supabase Core -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>

  <script>
    const appsContainer = document.getElementById('adminRequestsContainer');
    const activeAdminsContainer = document.getElementById('activeAdminsContainer');

    function fetchApps() {
      supabase.from('lyra_applications').select('*').order('timestamp', { ascending: false }).then(({ data }) => {
        if (!data) return;
        appsContainer.innerHTML = '';
        data.forEach((app) => {
          if (app.rolevalue !== 'adminAccess') return;

          const card = document.createElement('div');
          card.className = 'app-card';
          card.innerHTML = `
          <div class="app-info">
            <span class="app-role" style="background:var(--red);color:var(--white);">${(app.role || 'Admin Request').toUpperCase()}</span>
            <h2 class="app-name">${app.name} "${app.ign}"</h2>
            <div class="app-meta" style="margin-bottom:0.5rem;">
              <span>✉️ ${app.email}</span>
              <span>📱 ${app.discord}</span>
            </div>
            ${app.gamerole ? `<div style="margin-bottom:0.3rem;font-size:0.9rem;color:var(--gray-200);"><strong>Role:</strong> ${app.gamerole}</div>` : ''}
            ${app.experience ? `<div style="margin-bottom:1rem;font-size:0.9rem;color:var(--gray-200);"><strong>Experience:</strong><br/>${app.experience}</div>` : ''}
            <p class="app-reason" style="border-top:1px solid rgba(255,255,255,0.05); padding-top:1rem; margin-top:0.5rem;"><strong>Why LYRA?</strong><br/>"${app.reason}"</p>
          </div>
          <div class="app-actions">
            ${isOwner ? `
               <div style="margin-bottom: 0.5rem;">
                 <label style="font-size:0.75rem; color:var(--gray-600); text-transform:uppercase; font-family:'Barlow Condensed'; display:block; margin-bottom:0.3rem;">Grant Access level</label>
                 <select class="role-selector" style="width:100%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:0.5rem; font-family:'Barlow Condensed'; font-size:0.9rem; margin-bottom:0.5rem;">
                   <option value="Staff">Staff (Limited Access)</option>
                   <option value="Management">Management (Semi-Full Access)</option>
                   <option value="Owner">Owner (Full Access)</option>
                 </select>
                 <p style="font-size:0.65rem; color:var(--gray-600); line-height:1.3; font-style:italic;">Staff: Comms, Teams, Overview, Settings.<br/>Management: Full (No Owner Console).<br/>Owner: Total System Access.</p>
               </div>
               <button class="btn btn-accept" data-id="${app.id}" data-email="${app.email}" data-name="${app.name}" data-ign="${app.ign}">Grant & Notify</button>
               <button class="btn btn-decline" data-id="${app.id}">Decline</button>` :
               `<span style="color:var(--gray-600); font-size:0.8rem; font-family:'Barlow Condensed', sans-serif; text-align:center;">OWNER ONLY</span>`
            }
          </div>
        `;
          appsContainer.appendChild(card);
        });
      });
    }
    fetchApps();
    supabase.channel('apps_access').on('postgres_changes', { event: '*', schema: 'public', table: 'lyra_applications' }, fetchApps).subscribe();

    const currentUser = localStorage.getItem('lyra_user');
    const isOwner = currentUser && (currentUser.toLowerCase() === 'admin' || currentUser.toLowerCase() === 'versa');

    const activeMembersContainer = document.getElementById('activeMembersContainer');
    let allAdmins = [];
    let allRoster = [];

    function renderActiveMembers() {
      activeMembersContainer.innerHTML = '';

      const unifiedMap = new Map();
      allRoster.forEach(r => {
        if (r.ign) unifiedMap.set(r.ign.toLowerCase(), { ...r, orgType: 'roster' });
      });
      allAdmins.forEach(a => {
        const ignKey = (a.ign || '').toLowerCase();
        const existing = unifiedMap.get(ignKey);
        if (existing) {
          unifiedMap.set(ignKey, { ...existing, ...a, orgType: 'admin' });
        } else {
          unifiedMap.set(ignKey, { ...a, orgType: 'admin' });
        }
      });

      const members = Array.from(unifiedMap.values());
      members.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

      members.forEach(m => {
        const card = document.createElement('div');
        card.className = 'app-card';

        const isAppAdmin = m.orgType === 'admin';
        const roleBadgeColor = isAppAdmin ? 'var(--red)' : 'rgba(255,255,255,0.1)';
        const roleBadgeText = (m.customrole || m.rawrole || (isAppAdmin ? 'ADMINISTRATOR' : (m.game || 'ROSTER'))).toUpperCase();

        card.innerHTML = `
          <div class="app-info">
            <span class="app-role" style="background:${roleBadgeColor}; color:var(--white); border:1px solid rgba(255,255,255,0.1);">${roleBadgeText}</span>
            <h2 class="app-name">${m.name} "${m.ign || ''}"</h2>
            <div class="app-meta">
              <span>${isAppAdmin ? '✉️ ' + (m.email || 'No Email') : '🎮 ' + (m.customrole || m.rawrole || 'Member')}</span>
              <span>📱 ${m.discord || 'Not Linked'}</span>
            </div>
          </div>
          <div class="app-actions">
            ${isAppAdmin ? `
              ${isOwner ? `
                <select class="role-changer" data-ign="${m.ign}" style="width:100%; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:0.5rem; margin-bottom:0.5rem; font-size:0.8rem;">
                  <option value="Staff" ${roleBadgeText === 'STAFF' ? 'selected' : ''}>Staff</option>
                  <option value="Management" ${roleBadgeText === 'MANAGEMENT' ? 'selected' : ''}>Management</option>
                  <option value="Owner" ${roleBadgeText.includes('OWNER') ? 'selected' : ''}>Owner</option>
                </select>
                <button class="btn btn-decline btn-revoke" data-id="${m.id}" style="font-size:0.7rem; padding:0.5rem;">Revoke Access</button>
              ` : `<span style="color:var(--gray-600); font-size:0.8rem;">OWNER ONLY</span>`}
            ` : `<a href="admin-roster.html" class="btn btn-decline" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">Manage</a>`}
          </div>
        `;
        activeMembersContainer.appendChild(card);
      });
    }

    // Admins Sync
    function fetchAdmins() {
      supabase.from('lyra_approved_admins').select('*').then(({ data }) => {
        allAdmins = data || [];
        renderActiveMembers();
      });
    }
    fetchAdmins();
    supabase.channel('admins_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'lyra_approved_admins' }, fetchAdmins).subscribe();

    // Roster Sync
    function fetchRoster() {
      supabase.from('lyra_roster').select('*').then(({ data }) => {
        allRoster = data || [];
        renderActiveMembers();
      });
    }
    fetchRoster();
    supabase.channel('roster_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'lyra_roster' }, fetchRoster).subscribe();

    document.addEventListener('click', function (e) {
      if (e.target.classList.contains('btn-accept')) {
        const card = e.target.closest('.app-card');
        card.style.opacity = '0.5';
        card.style.pointerEvents = 'none';
        e.target.innerText = 'GRANTED';
        e.target.style.background = 'var(--green)';
        e.target.style.color = 'var(--black)';

        const id = e.target.getAttribute('data-id');
        const email = e.target.getAttribute('data-email');
        const name = e.target.getAttribute('data-name');
        const ign = e.target.getAttribute('data-ign');
        const role = e.target.closest('.app-card').querySelector('.role-selector').value;

        if (id) {
          supabase.from('lyra_applications').select('*').eq('id', id).single().then(({ data: app }) => {
            if (app) {
              const initialRole = role;

              // 1. Insert into Security table if it's an admin request or always if you want all accepted to have portal access
              // The user said "Everyone that joins", so we upsert to both for consistency.
              supabase.from('lyra_approved_admins').upsert([{
                name: app.name,
                ign: app.ign,
                email: app.email,
                discord: app.discord,
                password: 'Pending',
                role: initialRole
              }], { onConflict: 'ign' }).then(() => { });

              // 2. Insert into Roster table (Metadata)
              supabase.from('lyra_roster').upsert([{
                name: app.name,
                ign: app.ign,
                email: app.email,
                discord: app.discord,
                game: app.gameRole || 'Personnel',
                rawRole: initialRole,
                customRole: initialRole,
                country: '🇺🇸'
              }], { onConflict: 'ign' }).then(() => { });

              supabase.from('lyra_applications').delete().eq('id', id).then(() => { });
            }
          });
        }

        if (email && email !== 'undefined') {
          const subject = encodeURIComponent("LYRA Esports - Admin Access Approved");
          const body = encodeURIComponent(`Hello ${name},\n\nYour application for Website Admin Access at LYRA Esports has been approved! Welcome to the management team.\n\nPlease finalize your account securely by setting up your new admin password here:\n[YOUR-WEBSITE-URL]/create-password.html\n\nBest,\nLYRA Administration`);
          window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
      }
      else if (e.target.classList.contains('role-changer')) {
         const newRole = e.target.value;
         const ign = e.target.getAttribute('data-ign');
         if (ign) {
           supabase.from('lyra_approved_admins').update({ role: newRole }).eq('ign', ign).then(() => {
             supabase.from('lyra_roster').update({ rawRole: newRole, customRole: newRole }).eq('ign', ign).then(() => {
               alert(`Role updated for ${ign}`);
             });
           });
         }
      }
      else if (e.target.classList.contains('btn-revoke')) {
        if (confirm("Are you sure you want to revoke this admin's access?")) {
          const id = e.target.getAttribute('data-id');
          if (id) supabase.from('lyra_approved_admins').delete().eq('id', id).then(() => { });
        }
      }
      else if (e.target.classList.contains('btn-decline')) {
        const id = e.target.getAttribute('data-id');
        if (id) supabase.from('lyra_applications').delete().eq('id', id).then(() => { });
      }
    });

    // Role-based Navigation Access
    const applyVisibility = () => {
      const uRole = (localStorage.getItem('lyra_role') || 'staff').toLowerCase();
      const uUser = (localStorage.getItem('lyra_user') || '').toLowerCase();
      const isSim = localStorage.getItem('lyra_view_as') !== null;
      const isSuper = (uUser === 'admin' || uUser === 'versa') && !isSim;
      
      const isOwnerOrIT = uRole.includes('owner') || uRole.includes('it director') || isSuper;
      const isManagement = isOwnerOrIT ||
        uRole.includes('management') ||
        uRole.includes('director') ||
        uRole.includes('recruiter') ||
        uRole.includes('lead') ||
        uRole.includes('manager');

      const mgmtNav = document.getElementById('nav-management');
      if (mgmtNav) mgmtNav.style.display = isManagement ? 'block' : 'none';

      const superNav = document.getElementById('nav-super');
      if (superNav) superNav.style.display = isOwnerOrIT ? 'block' : 'none';

      const versaNav = document.getElementById('nav-versa-master');
      if (versaNav) versaNav.style.display = (uUser === 'versa' && !isSim) ? 'block' : 'none';

      const newsNav = document.getElementById('nav-news');
      const ordersNav = document.getElementById('nav-orders');
      if (newsNav) newsNav.style.display = isManagement ? 'block' : 'none';
      if (ordersNav) ordersNav.style.display = isManagement ? 'block' : 'none';

      if (uRole === 'staff') {
          const accessNav = document.getElementById('nav-access');
          if (accessNav) accessNav.style.display = 'none';
          const restrictedPages = ['admin-news.html', 'admin-orders.html', 'admin-reviews.html', 'admin-roster.html', 'admin-access.html', 'admin-super-panel.html'];
          if (restrictedPages.includes(window.location.pathname.split("/").pop())) window.location.href = 'admin-overview.html';
      }
    };
    applyVisibility();

  </script>
  <script src="../animations.js"></script>
  <script src="../responsive.js"></script>
</body>

</html>
