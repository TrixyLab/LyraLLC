<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYRA - Professional Meeting Suite</title>
    <script src="portal-bridge.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #E8002D;
            --white: #FFFFFF;
            --black: #050505;
            --accent: #00E85D;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
            --panel-bg: rgba(10, 10, 10, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            background: radial-gradient(circle at 50% 120%, rgba(232, 0, 45, 0.1), transparent 70%), #050505;
        }

        /* LOBBY / INITIALIZATION */
        #lobby {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(40px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lobby-card {
            background: var(--panel-bg);
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            overflow: hidden;
        }

        .lobby-left {
            padding: 3rem;
            background: rgba(255, 255, 255, 0.02);
        }

        .lobby-right {
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .preview-box {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        #previewVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* MAIN VIEWPORT */
        .meeting-container {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .main-stage {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            transition: padding 0.5s;
        }

        .video-grid {
            flex: 1;
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            transition: all 0.5s ease;
        }

        /* PRESENTATION MODE (Auto-triggered by .featured) */
        .meeting-container:has(.featured) .video-grid {
            grid-template-columns: 1fr 280px;
        }

        .video-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(20, 20, 20, 0.4);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-wrapper.featured {
            grid-column: 1;
            grid-row: 1 / span 20;
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(232, 0, 45, 0.15);
        }

        .meeting-container:has(.featured) .video-wrapper:not(.featured) {
            grid-column: 2;
            aspect-ratio: 16/9;
            height: auto;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-wrapper.self video:not([data-screen="true"]) {
            transform: scaleX(-1);
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.7) 0%, transparent 40%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1rem;
        }

        .user-id-tag {
            font-family: 'Barlow Condensed';
            font-weight: 700;
            font-size: 0.75rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-pill {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* SIDEBAR LIST */
        .meeting-sidebar {
            width: 300px;
            background: rgba(10, 10, 10, 0.4);
            border-left: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }

        .meeting-sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            font-family: 'Bebas Neue';
            font-size: 1.5rem;
            letter-spacing: 0.05em;
        }

        .participant-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .participant-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .participant-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--glass);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--red);
        }

        /* CONTROLS */
        .control-bar {
            height: 80px;
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            position: relative;
            z-index: 500;
            display: none;
        }

        .btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: var(--gray-200);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn.active {
            background: var(--red);
            border-color: var(--red);
            color: #fff;
        }

        .btn.leave {
            background: var(--red);
            border-color: var(--red);
            color: #fff;
            width: 60px;
            border-radius: 30px;
        }

        .btn.leave:hover {
            background: #b00020;
            transform: scale(1.05);
        }

        svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .room-info {
            position: absolute;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .room-name {
            font-family: 'Barlow Condensed';
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--red);
        }

        .secondary-controls {
            position: absolute;
            right: 2rem;
            display: flex;
            gap: 0.8rem;
        }

        /* TYPOGRAPHY */
        h1,
        h2,
        h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
        }

        .label-sm {
            font-family: 'Barlow Condensed';
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #555;
            letter-spacing: 0.15em;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-select,
        .form-input {
            width: 100%;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem;
            color: #fff;
            font-family: 'Outfit';
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            outline: none;
        }

        .primary-btn {
            width: 100%;
            background: var(--red);
            color: #fff;
            border: none;
            padding: 1rem;
            font-family: 'Barlow Condensed';
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: 0.2s;
        }

        .primary-btn:hover {
            background: #b00020;
            letter-spacing: 0.15em;
        }

        /* ANIMATIONS */
        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        .recording-dot {
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
    </style>
</head>

<body>

    <div id="lobby">
        <div class="lobby-card">
            <div class="lobby-left">
                <span class="label-sm">System Check</span>
                <h2 style="font-size: 2.2rem; margin-bottom: 0.5rem;">Ready to Join?</h2>
                <p style="color: #666; font-size: 0.9rem; margin-bottom: 2rem;">Ensure your encryption keys and hardware
                    are verified.</p>
                <div class="preview-box"><video id="previewVideo" autoplay playsinline muted></video></div>
            </div>
            <div class="lobby-right">
                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="label-sm">Meeting Name / Room ID</span>
                        <div style="display:flex; gap:10px;">
                            <span id="clearRoom" title="Clear Name"
                                style="cursor:pointer; font-size:10px; color:#555; font-weight:bold;">CLEAR</span>
                            <span id="randomizeRoom" title="Generate Name"
                                style="cursor:pointer; font-size:10px; color:var(--accent); font-weight:bold;"><i
                                    class="fas fa-magic"></i> AUTO</span>
                        </div>
                    </div>
                    <input type="text" id="roomName" class="form-input" placeholder="e.g. MISSION-OMEGA"
                        value="MAIN-OPS" style="margin-bottom:0.5rem; border-color:var(--accent);">
                    <p style="font-size:10px; color:#555; margin-bottom:1rem;">Type any name to create a new dedicated
                        room.</p>
                </div>
                <div class="form-group">
                    <span class="label-sm">Camera Input</span>
                    <select id="camSelect" class="form-select"></select>
                </div>
                <div class="form-group">
                    <span class="label-sm">Audio Input</span>
                    <select id="micSelect" class="form-select"></select>
                </div>
                <button id="joinBtn" class="primary-btn">CREATE MEETING</button>

                <div id="liveSessions" style="margin-top: 2rem;">
                    <span class="label-sm">Active Sessions</span>
                    <div id="sessionList"
                        style="max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 4px; padding: 5px;">
                        <div style="padding: 20px; text-align: center; color: #444; font-size: 11px;">Scanning for
                            active links...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="meeting-container">
        <main class="main-stage">
            <div id="videoGrid" class="video-grid"></div>
        </main>

        <aside class="meeting-sidebar" id="sidebar">
            <div class="sidebar-header">Participants</div>
            <div class="participant-list" id="pList"></div>
        </aside>
    </div>

    <footer class="control-bar" id="controlBar">
        <div class="room-info">
            <div class="recording-dot"></div>
            <span class="room-name" id="displayRoom">SECURE SESSION</span>
        </div>

        <button class="btn" id="toggleMic" title="Toggle Microphone">
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                <path
                    d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
            </svg>
        </button>
        <button class="btn" id="toggleCam" title="Toggle Camera">
            <svg viewBox="0 0 24 24">
                <path
                    d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z" />
            </svg>
        </button>
        <button class="btn" id="toggleScreen" title="Share Screen">
            <svg viewBox="0 0 24 24">
                <path
                    d="M21 3H3c-1.11 0-2 .89-2 2v12c0 1.1.89 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.11-.9-2-2-2zm0 14H3V5h18v12z" />
            </svg>
        </button>

        <button class="btn" id="inviteBtn" title="Invite Admins">
            <svg viewBox="0 0 24 24">
                <path
                    d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg>
        </button>

        <button class="btn leave" id="leaveBtn" title="Leave Session">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M18 6L6 18M6 6l12 12" />
            </svg>
        </button>

        <div class="secondary-controls">
            <button class="btn" id="toggleSidebar" title="Participants List">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" />
                </svg>
            </button>
            <button class="btn" id="toggleCinema" title="Toggle Speaker View">
                <svg viewBox="0 0 24 24">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                </svg>
            </button>
        </div>
    </footer>

    <script>
        // Safe Shell Detection
        let shell = null;
        try {
            shell = window.parent.LyraMeeting;
        } catch (e) {
            console.error("Shell Access Error:", e.message);
        }
        const joinBtn = document.getElementById('joinBtn'), lobby = document.getElementById('lobby'), previewVideo = document.getElementById('previewVideo');
        const camSelect = document.getElementById('camSelect'), micSelect = document.getElementById('micSelect'), videoGrid = document.getElementById('videoGrid');
        const pList = document.getElementById('pList'), sidebar = document.getElementById('sidebar');
        let localStream = null;

        async function getDevices() {
            if (!navigator.mediaDevices) {
                log("!! Media devices API unavailable !! Check HTTPS.");
                camSelect.innerHTML = '<option value="none">SECURE CONTEXT REQUIRED</option>';
                return;
            }
            try {
                const devs = await navigator.mediaDevices.enumerateDevices();
                log(`Found ${devs.length} total hardware nodes.`);
                camSelect.innerHTML = ''; micSelect.innerHTML = '';
                let vFound = 0, aFound = 0;

                devs.forEach(d => {
                    // Be more lenient: some browsers hide deviceId before permission
                    if (d.kind === 'videoinput') {
                        vFound++;
                        const label = d.label || `Camera ${vFound} (Locked)`;
                        camSelect.add(new Option(label, d.deviceId || 'locked'));
                    }
                    if (d.kind === 'audioinput') {
                        aFound++;
                        const label = d.label || `Microphone ${aFound} (Locked)`;
                        micSelect.add(new Option(label, d.deviceId || 'locked'));
                    }
                });
                if (vFound === 0) camSelect.add(new Option("No Camera Detected", "none"));
                if (aFound === 0) micSelect.add(new Option("No Microphone Detected", "none"));

                log(`Detected: ${vFound} cams, ${aFound} mics.`);
            } catch (e) { log("Device probe error: " + e.message); }
        }

        async function requestPermissions() {
            log("Prompting for hardware access...");
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                log("Access GRANTED.");
                s.getTracks().forEach(t => t.stop());
                await getDevices(); // Refresh list now that labels are unlocked
                document.getElementById('permBtn')?.remove();
                initLobby(); // Restart lobby preview
            } catch (e) {
                log("Access DENIED: " + e.message);
                alert("Permission Denied: Please allow Camera & Mic access in your browser bar.");
            }
        }

        async function initLobby() {
            // Auto-fill room from URL
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            if (roomParam) document.getElementById('roomName').value = roomParam;

            if (window.location.origin === "null") {
                log("⚠️ Origin is 'null' (Local File detected).");
                log("Cross-frame features and Realtime require a web server.");
            }
            if (!shell) {
                log("!! Portal Shell unreachable !!");
                log("Please open this page through admin-shell.html on a web server.");
                const warn = document.createElement('div');
                warn.style.cssText = 'background:rgba(232,0,45,0.1); border:1px solid var(--red); padding:1rem; margin-bottom:1rem; border-radius:4px; font-size:0.8rem; line-height:1.4;';
                warn.innerHTML = `<strong>SECURITY WARNING:</strong> Direct hardware access and Realtime sync are blocked by your browser because this file is not on a web server.<br><br><a href="admin-shell.html" style="color:white; font-weight:bold;">TRY OPENING VIA SHELL</a>`;
                document.querySelector('.lobby-right').prepend(warn);
            }
            await getDevices();
            fetchMeetings();
            try {
                log("Attempting media probe...");
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                previewVideo.srcObject = localStream;
                log("Media probe successful.");
                await getDevices(); // Refresh labels now that we have session permission
            } catch (e) {
                log("Media probe failed: " + e.message);
                const b = document.createElement('button');
                b.id = 'permBtn';
                b.className = 'primary-btn';
                b.style.cssText = 'background:#E8002D; margin-top:2rem; border:none; padding:15px; cursor:pointer; font-weight:bold; width:100%; color:white; border-radius:4px; box-shadow:0 0 20px rgba(232,0,45,0.4);';
                b.innerText = 'FIX HARDWARE PERMISSIONS';
                b.onclick = () => requestPermissions();
                document.querySelector('.lobby-right').appendChild(b);

                const tip = document.createElement('p');
                tip.style.cssText = 'font-size:11px; color:#888; margin-top:1rem; text-align:center;';
                tip.innerHTML = `Still stuck? <a href="admin-meetings.html" target="_blank" style="color:#E8002D; text-decoration:none; font-weight:bold;">OPEN IN NEW WINDOW</a>`;
                document.querySelector('.lobby-right').appendChild(tip);
            }

            // REAL-TIME SYNC FOR LOBBY
            let db = null;
            try { db = window.parent.supabase; } catch (e) { }
            if (db) {
                db.channel('lobby_updates')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'lyra_meetings' }, payload => {
                        log("Lobby Refresh: Data change detected.");
                        fetchMeetings();
                    })
                    .subscribe();
            }
        }

        // Randomize Room Name
        document.getElementById('randomizeRoom').onclick = () => {
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            document.getElementById('roomName').value = 'OPS-' + code;
            log("New channel ID generated: OPS-" + code);
        };

        // Clear Room Name
        document.getElementById('clearRoom').onclick = () => {
            document.getElementById('roomName').value = '';
            document.getElementById('roomName').focus();
            log("Input cleared for custom naming.");
        };

        initLobby();

        const statusLog = document.createElement('div');
        statusLog.style.cssText = 'font-family:monospace; font-size:10px; color:#555; margin-top:10px; text-align:left; max-height:50px; overflow:hidden;';
        document.querySelector('.lobby-right').appendChild(statusLog);

        function log(msg) {
            statusLog.innerHTML = msg + '<br>' + statusLog.innerHTML;
            console.log("Lobby: " + msg);
        }

        async function fetchMeetings() {
            let db = null;
            try { db = window.parent.supabase; } catch (e) { }
            if (!db) return;

            const { data, error } = await db.from('lyra_meetings').select('*').eq('is_active', true).order('created_at', { ascending: false });

            const list = document.getElementById('sessionList');
            if (!list) return;
            list.innerHTML = '';

            if (error) {
                list.innerHTML = `<div style="padding:10px; color:var(--red); font-size:10px;">Sync Error: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = `<div style="padding:20px; text-align:center; color:#444; font-size:11px;">No active sessions found. Start one above.</div>`;
            } else {
                data.forEach(m => {
                    const row = document.createElement('div');
                    row.style.cssText = 'padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;';

                    const info = document.createElement('div');
                    info.innerHTML = `<div style="font-weight:bold; font-size:12px; color:var(--accent);">#${m.room_name}</div><div style="font-size:10px; color:#555;">Host: ${m.creator_ign}</div>`;

                    const join = document.createElement('button');
                    join.innerText = 'JOIN';
                    join.style.cssText = 'background:var(--accent); border:none; padding:5px 15px; color:white; font-family:Bebas Neue; font-size:14px; cursor:pointer; border-radius:2px;';
                    join.onclick = () => {
                        document.getElementById('roomName').value = m.room_name;
                        log("Joining established session: " + m.room_name);
                        document.getElementById('joinBtn').click(); // Trigger main join logic
                    };

                    row.appendChild(info);
                    row.appendChild(join);
                    list.appendChild(row);
                });
            }
        }

        joinBtn.onclick = async () => {
            const room = document.getElementById('roomName').value.trim() || 'MAIN-OPS';
            log("Attempting uplink to: " + room);
            joinBtn.innerText = "AUTHENTICATING..."; joinBtn.disabled = true;

            if (localStream) localStream.getTracks().forEach(t => t.stop());

            if (!shell) {
                joinBtn.innerText = "SHELL ERROR";
                log("!! Fatal: Shell Connection Blocked !!");
                alert("Security Error: This module cannot communicate with the portal shell. \n\nPlease run this from a web server (http://localhost or HTTPS).");
                return;
            }

            try {
                log("Requesting shell initialization...");
                const s = await shell.start(room, { camId: camSelect.value, micId: micSelect.value });
                log("Shell ready, joining viewport.");

                // IMMEDIATE UI TRANSITION
                lobby.style.display = 'none';
                document.getElementById('controlBar').style.display = 'flex';
                document.getElementById('displayRoom').innerText = room;

                // Auto-open sidebar on start
                sidebar.classList.add('open');

                // Track meeting in DB (Background)
                let db = null;
                try { db = window.parent.supabase; } catch (e) { }
                if (db) {
                    db.from('lyra_meetings').upsert({
                        room_name: room,
                        creator_ign: window.parent.currentUser || 'Unknown',
                        is_active: true,
                        last_activity: new Date().toISOString()
                    }, { onConflict: 'room_name' }).then(({ error: dbErr }) => {
                        if (dbErr) log("DB Info: " + dbErr.message);
                    });
                }

                // Add Local Video
                addVideoWrapper('local', s, 'You', true);

                // Set callbacks
                shell.registerCallback('onStreamAdded', d => {
                    addVideoWrapper(d.id, d.stream, d.name);
                    updateParticipants();
                });
                shell.registerCallback('onStreamRemoved', id => {
                    const el = document.getElementById(`vw-${id}`);
                    if (el) el.remove();
                    updateParticipants();
                });
                shell.registerCallback('onMuteStatus', d => {
                    const pItem = document.querySelector(`[data-p-id="${d.id}"] .status-pill`);
                    if (pItem) pItem.style.background = d.isMuted ? 'var(--red)' : 'var(--accent)';
                });

                updateParticipants();
            } catch (e) {
                joinBtn.innerText = "RETRY UPLINK"; joinBtn.disabled = false;
                alert("Connection failed. Check permissions.");
            }
        };

        function addVideoWrapper(id, stream, name, isLocal = false) {
            if (document.getElementById(`vw-${id}`)) return;
            const w = document.createElement('div'); w.className = 'video-wrapper' + (isLocal ? ' self' : ''); w.id = `vw-${id}`;
            const v = document.createElement('video'); v.srcObject = stream; v.autoplay = true; v.playsinline = true;
            if (isLocal) v.muted = true;

            // Check if it's a screen share (detect screen_ prefix from shell)
            if (id.includes('screen') || id.includes('_screen')) {
                v.setAttribute('data-screen', 'true');
                w.classList.add('featured'); // Auto-focus screen shares
                log("Presentation started: Screen detected.");
            }

            const o = document.createElement('div'); o.className = 'video-overlay';
            o.innerHTML = `<div class="user-id-tag"><div class="status-pill"></div>${name}</div>`;

            w.onclick = () => {
                document.querySelectorAll('.video-wrapper').forEach(x => x.classList.remove('featured'));
                w.classList.add('featured');
            };

            w.appendChild(v); w.appendChild(o); videoGrid.appendChild(w);
        }

        function updateParticipants() {
            pList.innerHTML = '';
            // Add self
            addParticipantItem('local', 'You (Me)');
            // Add others
            Object.values(shell.remoteStreams).forEach(p => {
                addParticipantItem(p.id, p.name);
            });
        }

        function addParticipantItem(id, name) {
            const item = document.createElement('div');
            item.className = 'participant-item';
            item.setAttribute('data-p-id', id);
            item.innerHTML = `<div class="avatar">${name.charAt(0)}</div><div style="flex:1; font-weight:500;">${name}</div><div class="status-pill"></div>`;
            pList.appendChild(item);
        }

        // Controls
        document.getElementById('toggleMic').onclick = () => {
            const muted = shell.toggleMic();
            document.getElementById('toggleMic').classList.toggle('active', muted);
        };
        document.getElementById('toggleCam').onclick = () => {
            const off = shell.toggleCam();
            document.getElementById('toggleCam').classList.toggle('active', off);
        };
        document.getElementById('toggleScreen').onclick = async () => {
            try {
                const stream = await shell.toggleScreenShare();
                const active = !!stream;

                // If we're starting local share, add it to our own grid
                if (active) {
                    addVideoWrapper('local_screen', stream, 'Your Screen (Presenting)', false);
                } else {
                    const el = document.getElementById('vw-local_screen');
                    if (el) el.remove();
                }

                document.getElementById('toggleScreen').classList.toggle('active', active);
            } catch (e) {
                log("Screen Share Error: " + e.message);
            }
        };
        document.getElementById('toggleSidebar').onclick = () => sidebar.classList.toggle('open');
        document.getElementById('toggleCinema').onclick = () => {
            videoGrid.classList.toggle('cinema');
            document.getElementById('toggleCinema').classList.toggle('active');
        };
        document.getElementById('inviteBtn').onclick = () => {
            const room = document.getElementById('displayRoom').innerText;
            const inviteUrl = window.location.origin + window.location.pathname.replace('admin-meetings.html', 'admin-shell.html') + '?p=admin-meetings.html&room=' + encodeURIComponent(room);

            navigator.clipboard.writeText(inviteUrl).then(() => {
                const originalText = document.getElementById('inviteBtn').innerHTML;
                document.getElementById('inviteBtn').innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => { document.getElementById('inviteBtn').innerHTML = originalText; }, 2000);
                log("Invite Link copied to clipboard!");
            }).catch(err => {
                alert("Invite Link: " + inviteUrl);
            });
        };
        document.getElementById('leaveBtn').onclick = () => {
            if (confirm("Disconnect from secure link?")) {
                shell.leave();
                location.reload();
            }
        };

    </script>
</body>

</html>
